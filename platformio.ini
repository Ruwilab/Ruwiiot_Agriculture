; PlatformIO Project Configuration File
; Proyecto ESP32 / ESP8266 - Envío de datos por WiFi

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Configuración del monitor serial
monitor_speed = 115200

; Forzar el puerto serie del ESP32 (ajusta si cambia el puerto)
;upload_port = /dev/cu.usbserial-142230

; Librerías incluidas (WiFi y HTTP vienen con Arduino-ESP32)
lib_deps =
  knolleary/PubSubClient
  adafruit/DHT sensor library@^1.4.3
  adafruit/Adafruit Unified Sensor
  bblanchon/ArduinoJson @ ^7.0.0 

 